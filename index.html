<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defense & Ethik</title>
</head>

<body>

    <section id="career-scene">

        <div class="story-sticky">

            <div
                class="textbox phase-hidden"
                id="intro-box">

                <h2>Karriereentscheidung</h2>

                <p>
                    <span id="intro-total-count"></span> Personen haben an der Umfrage teilgenommen.
                </p>

                <p>
                    Die Frage lautete:
                </p>

                <p>
                    <strong>
                        Würdest du eher zu einem Militärunternehmen
                        für 20 % mehr Gehalt oder zu einem zivilen
                        Unternehmen mit geringerem Gehalt gehen?
                    </strong>
                </p>

            </div>


            <!-- Avatar-Vorstellung -->
            <div
                class="avatar-stage phase-hidden"
                id="avatar-stage">

                <div class="avatar-icon-large">👤</div>

                <div class="avatar-facts">
                    <h3>Der typische Befragte</h3>
                    <ul>
                        <li id="avatar-fact-status"></li>
                        <li id="avatar-fact-geschlecht"></li>
                        <li id="avatar-fact-nationalitaet"></li>
                        <li id="avatar-fact-studiengang"></li>
                    </ul>
                </div>

            </div>


            <div
                class="sector university phase-hidden"
                id="university-box">

                <h2>Hochschulen</h2>

                <div
                    id="student-grid"
                    class="student-grid">
                </div>

            </div>


            <div
                class="sector-row phase-hidden"
                id="sector-row">

                <div
                    class="sector"
                    id="military-sector">

                    <div class="sector-header">
                        <h2>Militärsektor</h2>
                        <select id="military-filter" class="studiengang-filter">
                            <option value="alle">Alle Studiengänge</option>
                            <option value="Informatik">Informatik</option>
                            <option value="BWL">BWL</option>
                            <option value="Maschinenbau">Maschinenbau</option>
                        </select>
                    </div>

                    <div class="sector-grid"></div>

                    <div
                        id="military-percent"
                        class="percentage">
                    </div>

                </div>


                <div
                    class="sector"
                    id="civil-sector">

                    <div class="sector-header">
                        <h2>Ziviler Sektor</h2>
                        <select id="civil-filter" class="studiengang-filter">
                            <option value="alle">Alle Studiengänge</option>
                            <option value="Informatik">Informatik</option>
                            <option value="BWL">BWL</option>
                            <option value="Maschinenbau">Maschinenbau</option>
                        </select>
                    </div>

                    <div class="sector-grid"></div>

                    <div
                        id="civil-percent"
                        class="percentage">
                    </div>

                </div>

            </div>
            <div id="student-overlay"></div>

        </div>

    </section>

    <script type="module" src="/src/main.js"></script>

</body>

</html>
