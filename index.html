<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defense & Ethik</title>
</head>

<body>

    <section id="career-scene">

        <div class="story-sticky">

            <div
                class="textbox phase-hidden"
                id="intro-box">

                <h2>Karriereentscheidung</h2>

                <p>
                    Viele Studierende haben an der Umfrage teilgenommen.
                </p>

                <p>
                    Die Frage lautete:
                </p>

                <p>
                    <strong>
                        Würdest du eher zu einem Militärunternehmen
                        für 20 % mehr Gehalt oder zu einem zivilen
                        Unternehmen mit geringerem Gehalt gehen?
                    </strong>
                </p>

            </div>


            <div
                class="sector university phase-hidden"
                id="university-box">

                <h2>Hochschulen</h2>

                <div
                    id="student-grid"
                    class="student-grid">
                </div>

            </div>


            <div
                class="sector-row phase-hidden"
                id="sector-row">

                <div
                    class="sector"
                    id="military-sector">

                    <h2>Militärsektor</h2>

                    <div class="sector-grid"></div>

                    <div
                        id="military-percent"
                        class="percentage">
                    </div>

                </div>


                <div
                    class="sector"
                    id="civil-sector">

                    <h2>Ziviler Sektor</h2>

                    <div class="sector-grid"></div>

                    <div
                        id="civil-percent"
                        class="percentage">
                    </div>

                </div>

            </div>
            <div id="student-overlay"></div>

        </div>

    </section>

    <script type="module" src="/src/main.js"></script>

</body>

</html>
